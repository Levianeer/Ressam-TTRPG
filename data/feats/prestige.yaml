- name: Iron Path
  flavor: '“The warbands of Inggaz have no word for "parry." When an Orkh commits to violence, they do not dance around their enemy \- they move through them. Temür Zam, the Iron Path, is less a technique than a state of being: the absolute certainty that nothing between you and your destination matters. Scholars who have witnessed practitioners describe it as "fighting a landslide." The philosophy has spread beyond Orkhaden borders, adopted by anyone who has learned that overwhelming force solves problems skill cannot.”'
  prerequisites: STR 7+, \+5 ranks in Athletics, \+3 ranks in any melee weapon skill
  ritual: 'Carry something that should break you. Not in comfort, not with rest \- carry it until your body fails and your will is all that remains. The weight itself matters less than the refusal to set it down. Those who complete the path describe the same realization: nothing is heavy anymore.'
  effect: You no longer roll damage dice. Your weapon attacks deal fixed damage equal to your STR \+ half your weapon skill ranks (rounded down).
  mechanical_changes: |2-


    - Your damage is completely fixed \- no variation, no damage dice.
    - You can no longer score critical hits.
    - You cannot use Finesse weapons and can longer take the Parry Maneuver,
    - Effects that add damage dice instead add only 1 additional damage (adding 3d4 instead adds 3 flat damage).
    - Effects that add flat damage instead add only half their additional damage (adding 10 instead adds 5 flat damage).
- name: Final Strike
  flavor: '“In the fighting schools of the Tagarian Coalition, there exists a heretical teaching \- that speed is weakness. The Colpo Finale tradition holds that the first strike reveals everything: intention, stance, commitment, fear. The counter-striker who waits sees all of this, and responds not to what their enemy does, but to what their enemy has already decided to do. The style is associated with the Donati, though they neither confirm nor deny its origins. Those who master it describe combat as a conversation where they always speak the last word.”'
  prerequisites: REF 7+, \+5 ranks in Perception or Insight, \+3 ranks in any weapon skill
  ritual: Allow an enemy to land a blow you could have prevented. Do this with full knowledge, not from hesitation. Then, in the moment of their overextension, end them. Repeat until the urge to act first feels like a stranger's instinct.
  effect: You no longer roll initiative. You have no initiative score. You act last in every round, after all other creatures have completed their turns. You can no longer swap initiative with another.
  mechanical_changes: |2-


    - Once per round, when a creature takes any action, you may use your Reaction to interrupt \- taking your turn immediately (instead of at the end of the round). The triggering action is delayed until after your turn completes.
    - You cannot be surprised, but you cannot benefit from surprise rounds (you observe, but do not act during them).
    - Effects referencing "higher initiative" or "lower initiative" treat you as having the lowest possible value.
- name: Blood-Rule
  flavor: '“The scholars of the Grand Gnosion have long understood that life force and magical energy are not separate currencies \- they are the same coin, differently spent. Haimokrateia, "blood-rule," is the practical application of this theory: the caster''s own vitality becomes the fuel for their workings. The technique is neither forbidden nor encouraged in Mafsoleios; it is simply acknowledged as one of many paths. Among Strygs who learn this discipline, the blood itself becomes something else entirely \- Bloodfire, a writhing crimson flame that burns with stolen life.”'
  prerequisites: END 7+, \+4 ranks in any magic school, \+3 ranks in Medical Lore
  ritual: Drain yourself to the threshold. Not through violence or accident, but deliberately, in a place where power gathers. Stabilize yourself with nothing but will. The body must learn that emptiness is not death \- it is potential.
  effect: |-
    You may cast any spell you know using HP instead of Mana. The HP cost equals the spell's Mana Cost.

    Additionally, if you are a Stryg, you may convert any damage dealt by you into Bloodfire damage. Bloodfire manifests as a thick, writhing crimson flame laced with black \- viscous and pulsing like living blood \- that drips in heavy strands and bursts in wet explosions on impact, burning with a dark, organic heat unlike ordinary fire.
  mechanical_changes: |2-


    - Your Maximum Mana is reduced to 0, it can never be increased beyond 0\.
    - Temporary HP cannot be used for spell costs.
    - Any effect that would use Mana, instead uses your Hit Points.
    - HP spent as a casting cost is a cost, not damage \- it does not trigger effects that respond to taking damage.
    - If you die from HP spent on casting, the spell fails and you begin dying.
    - Does not affect Invocation spells, which already use their own HP conversion \- Invocation spells still cost HP equal to Mana Cost × 2, not × 1, and this feat doesn't change or discount that.
- name: Mirage of Light
  flavor: '“The Sword Sages of the Ederani Al''Nur embody living theology, demonstrating Lehovil''s protective light for those who follow his path. Their pinnacle technique, Sarab al-Nur \- the Mirage of Light \- allows practitioners to traverse not space, but perception, flickering like desert heat and reappearing with blade drawn where the eye denies possibility. Elders attribute this gift to Lehovil''s favor, yet they conceal its shadows: origins traced to the Dunestrife War, where Sages studied the Hwispian Maw''s wind-dancers and returned altered; ancient texts penned in Dzinariel, with forms echoing the abhorred Windform of desert monstrosities. The young are taught only of love''s invincibility \- perhaps that''s true enough.”'
  prerequisites: DEX 7+, \+5 ranks in Acrobatics, \+3 ranks in Stealth or Agility
  ritual: Cross a path that should kill you without relying on your senses. A chasm's edge. A trapped corridor. A collapsing structure. Trust not in balance or sight, but in the certainty that where danger expects you, you are already elsewhere.
  effect: |-
    In combat, you lose the normal Move action. Your only way to change position is **Slip** OR **Move** *at half your movement speed*.

    **Slip:**

    - Usable once per turn (no action cost).
    - Instantly relocate to any unoccupied space you can see within a distance equal to your current movement speed (including racial bonuses, Feline Agility, temporary speed buffs, etc.).
    - This movement:
      - Does not provoke opportunity attacks.
      - Does not count as teleportation.

    **Pathing Restriction:** You can only Slip to a space you could reach with normal movement. You cannot pass through walls, barriers, creatures' spaces, or other impassable obstacles; you cannot change elevation without a valid climbing or jumping path. Slip removes the physical act of traversal \- not the limitations of the path itself.

    **Dash Interaction:** If you take the Dash action as a Major Action, you gain one additional Slip that turn (maximum two Slips per turn).
  mechanical_changes: |2-


    - You cannot wear armor that would induce any Armor Penalty (after Armorer reduction).
- name: Bulwark of Mind
  flavor: '“Henri Gachet Gautier, built his theology on protection \- of homes, of people, of the structures that let mortals thrive. His Order of Protectors, Les Falaises, train builders and healers and defenders in equal measure. Rempart d''Esprit is the purest expression of that doctrine: the caster''s own power becomes the wall between harm and the innocent. The technique requires absolute conviction. Doubt creates cracks, and cracks let death through. Those who master it describe incoming blows as "requests they deny."”'
  prerequisites: MIND 7+, \+4 ranks in any magic school, \+3 ranks in Arcane Lore or Religious Lore
  ritual: Stand between something precious and something terrible, with nothing but your will as shield. No armor. No blade raised. No ally to intervene. Hold until the threat breaks or you do.
  effect: When you take damage, you may spend a Reaction and expend Mana or spell scrolls to reduce that damage by 2 for each point of Mana spent, or each point of Mana Cost from a consumed scroll.
  mechanical_changes: |2-


    - You may split the reduction between Mana and scrolls in any combination.
    - If damage is reduced to 0, the attack counts as having missed (your armor does not degrade, effects that trigger "on hit" do not occur).
    - Scrolls consumed this way are destroyed without casting their spell.
- name: Thane's Brand
  flavor: '"Before the Tor''Az standardized runic education, the old clans carved power into their own flesh. A warrior''s scars told you what magic they carried  \-  and how much pain they could endure. The practice fell from favor as industry rose; too painful, too personal, too permanent for an age of mass-produced scrolls and assembly-line enchantment. But in the deep holds where the old ways linger, some still take the brand. They carry fewer spells than a scroll-mage but they never run out of ink."'
  prerequisites: ARC 7+, \+5 ranks in any arcane magic school, \+3 ranks in Crafting
  ritual: Destroy your spellbook  \-  every page, every scroll, every scrap of parchment that holds your magic. Melt the ink. Burn the vellum. Then, with chisel and your own blood as pigment, carve the first rune into your flesh. Work until the stone of your body accepts it. When the wound closes around the mark and the power answers your hand instead of your pen, you will never need parchment again.
  effect: |-
    You can no longer scribe scrolls. Instead, during a Field Rest or Long Rest, you carve arcane runes into your body, armor, or weapons. Each brand holds one spell you know. You may maintain a number of brands equal to your MIND score. You cannot carve a spell with a total Mana Cost higher than your MIND ÷ 2\.

    You have a number of **Rune Charges** equal to your Crafting skill ÷ 2 (rounded up). Casting any branded spell expends 1 Rune Charge, regardless of the spell's Mana Cost. No additional Mana is spent to cast. All Rune Charges are restored when you complete a Field Rest or Long Rest.

    **Rune Surge:** When you have no remaining Rune Charges, you may still cast a branded spell by spending Mana equal to the spell's Mana Cost × 3\. This represents forcing power through an exhausted rune and cannot be reduced by any effect.

    **Runic Inscription:** Once per Field Rest or Long Rest, you may spend 10 minutes to carve a rune onto a surface, object, or doorway. The rune holds one spell you currently have branded (that brand goes dormant until your next Field Rest or Long Rest and cannot be re-energized). You set a trigger condition when carving. The rune lasts until triggered or until your next Field Rest or Long Rest. Only one Runic Inscription may exist at a time.
  mechanical_changes: |2-


    - You cannot scribe, carry, use, or benefit from spell scrolls in any form. Feats or effects that reduce scroll Mana costs (such as Arcane Focus) do not apply to you.
    - Brands cannot be shared with or activated by allies.
    - Instability does not apply to your scribed Runes.
    - Your brands glow faintly when you cast or take damage. You have disadvantage on Stealth checks to conceal your nature as a spellcaster.
- name: Fallen Wing
  flavor: '“The great cathedrals of Gran Reino preach devotion to the God-Dragons \- light, order, the certainty of divine judgment. But every faith casts a shadow, and Fe Alada''s shadow is long indeed. Alada Caída, the Fallen Wing, is what happens when a believer looks too closely at the nature of their devotion and finds something hungry looking back. The healing light curdles. The blessed words rot in the throat. The High Lord''s inquisitors hunt practitioners when they find them, which only confirms what the fallen already know: the church fears this path because it works.”'
  prerequisites: FAI 7+, \+5 ranks in any divine magic school, \+3 ranks in Religious Lore
  ritual: 'Betray the God-Dragons in their house. The method matters less than the sincerity \- a defiled altar, a slain priest, a prayer spoken backward with genuine intent. Feel the familiar warmth of faith curdle into something colder, and understand: the power never left. Only its direction changed.'
  effect: |-
    All your divine spells deal necrotic damage (instead of radiant). When you cast a spell that would heal a creature, you may choose to invert it: the spell deals necrotic damage to the target and you gain temporary HP equal to half the damage dealt.

    Once per combat, when you successfully damage a creature with a Benediction or Cultivation spell, you may force them to make a FAI Ward check (DC \= 5 \+ your FAI \+ spell school rank) or become Frightened of you until the end of your next turn.
  mechanical_changes: |2-


    - Gain resistance to necrotic damage; vulnerability to radiant damage (double damage).
    - Once per Field Rest or Long Rest, you may animate a fresh corpse (dead no longer than 1 hour) as a **Fallen Thrall** (stats below). The thrall obeys your mental commands and lasts until destroyed, you may only have one at a time.
    - You have advantage on spell rolls against enemies within 10 ft.
    - Daily profane rite required (1 hour of meditation in darkness, defacing a holy symbol, or performing forbidden prayers). If not performed, lose all divine spellcasting until the rite is completed.

    **Fallen Thrall Statistics:**

    - HP: Your FAI × 4
    - Evasion: 8 \+ your FAI
    - AR: 2 (decayed flesh)
    - Speed: 30 ft
    - Attributes: STR 4, REF 3, END 5, DEX 3, MIND 1, ARC 0, FAI 0, CHA 1
    - Attack: Slam \+your spell modifier to hit, 1d6 \+ your FAI necrotic damage
    - Special: Shares your initiative, acts immediately after your turn
- name: Soul-Bond
  flavor: “The Elar'laevien tradition of Bloodwood crafting proves that weapons can hold a piece of their wielder. Anamcheangal, the Soul-Bond, takes this principle further \- and asks less of the material. Any blade, any bow, any humble club can become an extension of the self if the practitioner is willing to give enough of themselves to it. The technique has spread far from its Aurkhani origins, adopted by warriors who understand that the deadliest weapon is the one that knows you completely. The bond is not metaphorical. The weapon listens. Sometimes, it answers.”
  prerequisites: CHA 7+, \+4 ranks in any CHA skill, \+3 ranks in any weapon skill
  ritual: Speak to your weapon. Not as a performance \- truly speak, every night, for a turning of the moon. Tell it what you fear. What you want. What you have never told anyone living. On the final night, feed it your blood. If you were sincere, you will know. If you were not, you have wasted a month talking to metal.
  effect: Choose one weapon you own. It is now bound to your soul. You use CHA for attack and damage rolls with this weapon, instead of STR or REF.
  mechanical_changes: |2-


    - You may recall the bound weapon to your hand from up to 240 ft as a Minor Action.
    - If the weapon is destroyed, or remains beyond 240 ft for longer than 24 hours, you take damage equal to your CHA \+ the skill you use for the weapon. This damage repeats daily until the weapon is restored or replaced through a new binding ritual.
    - You cannot bind a new weapon while your current weapon exists and is within range.
    - Binding a new weapon requires repeating the full ritual.
