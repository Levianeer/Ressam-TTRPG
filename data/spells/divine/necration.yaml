- name: Mortis Grasp
  mana_cost: 1
  casting_time: Major Action
  range: Touch
  duration: Instant
  effect: Make a melee spell attack roll vs. target's Evasion. On hit, deal 1d6+FAI necrotic damage. You gain tHP equal to half the damage dealt to the target (after AR reduction).
- name: Creeping Rot
  mana_cost: 2
  casting_time: Major Action
  range: 30 ft
  duration: Channel
  effect: |-
    Target one creature you can see. Make a spell overcome roll vs. the target's END Ward.

      - **Overcome:** The target’s armor degrades by 1 AR and they take 1d6+FAI necrotic damage. At the start of each of your turns while channeling, the effect continues automatically.
      - **Resist:** The target’s armor degrades by 1 AR and the target takes 1d6+FAI necrotic damage, the spell ends.


    - At the end of each of their turns, the target may attempt to fight off the rot by rolling 1d12 \+ END \+ best END skill vs. the original spell roll. On success, the spell ends.
- name: Grave Terror
  mana_cost: 2
  casting_time: Major Action
  range: 30 ft
  duration: 1 minute
  effect: |-
    You force a creature to glimpse their own death. Make a spell overcome roll vs. the target's MIND Ward.

      - **Overcome:** The creature is Frightened of you for the duration. While frightened, they cannot willingly move closer to you. At the end of each of their turns, the target may attempt to steel themselves by rolling 1d12 \+ MIND \+ best MIND skill vs. the original spell roll. On success, the effect ends.
      - **Resist:** The creature resists the vision but is shaken \- they have disadvantage on their next attack roll.


    - If a creature dies within 30 ft of a frightened target, that target must immediately roll 1d12 \+ MIND \+ best MIND skill vs. the original spell roll or the duration resets.
- name: Raise Thrall
  mana_cost: 3
  casting_time: Major Action
  range: Touch
  duration: 24 hour
  effect: You animate a humanoid corpse as an undead thrall under your control. The thrall acts immediately after your turn, following simple verbal commands (no action required). It has HP equal to your FAI × 4, AR 0, Evasion 10, and attacks with STR 4 using whatever weapon it held in life (or 1d4 bludgeoning unarmed). The thrall cannot speak, use skills, or take reactions. When the spell ends, the corpse collapses \- it cannot be animated again for 8 hours.
- name: Mortis Harvest
  mana_cost: 4
  casting_time: Reaction (when a creature within range drops to 0 HP)
  range: 30 ft
  duration: Instant
  effect: |-
    You rip the departing life force from a dying creature. Choose one effect:

    - **Consume:** Regain Mana equal to half the creature's END (rounded down, minimum 1).
    - **Transfer:** Grant an ally within 30 ft temporary HP equal to the creature's maximum HP ÷ 2\.
    - **Bind:** Store the essence. You may release it within the next hour to cast the spell Raise Thrall with no Mana Cost (Must know the spell Raise Thrall).
- name: Soul Rend
  mana_cost: 5
  casting_time: Major Action
  range: 60 ft
  duration: Instant
  effect: |-
    You tear at the connection between a creature's soul and body. Make a spell overcome roll vs. the target's MIND Ward.

      - **Overcome:** 4d8 \+ FAI necrotic damage and the target’s armor degrades by 2 AR.
      - **Resist:** Half damage and their armor does not degrade.

    - If this spell reduces a creature to 0 HP, you may immediately animate their corpse as per Raise Thrall without spending additional Mana or requiring concentration (this thrall lasts 1 hour, then collapses permanently).
