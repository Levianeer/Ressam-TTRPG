- name: Frigid Grip
  mana_cost: 1
  casting_time: Major Action
  range: Touch
  duration: Instant
  effect: Frost crawls across a creature you can see. Make a melee spell attack roll vs. target's Evasion. On hit, deal 1d6 \+ ARC cold damage. The target's movement speed is reduced by 15 ft until the end of their next turn. If this reduces their speed to 0, ice locks them solid \- they cannot take Reactions until the end of their next turn.
- name: Rime Slick
  mana_cost: 2
  casting_time: Major Action
  range: 60 ft
  duration: 1 minute
  effect: |-
    You freeze moisture across a 15-foot radius area centered on a point you can see. The area becomes treacherous terrain:

      - **Difficult Terrain:** Movement costs double.
      - **Treacherous Footing:** Any creature that moves more than 5 ft through the area on a single turn must contest your spell \- make a spell overcome roll vs. their DEX Ward. Overcome: they fall prone.


    - Creatures with cold immunity or appropriate footwear (crampons, clawed feet) are unaffected by the prone effect but still treat it as difficult terrain.
- name: Shrouding Mist
  mana_cost: 2
  casting_time: Major Action
  range: 60 ft (20 ft radius)
  duration: Channel
  effect: |-
    You draw moisture from the air into a thick, clinging fog centered on a point you can see. The area is heavily obscured. Creatures inside have disadvantage on Perception checks relying on sight.

    - While channeling, you can move the mist up to 20 ft as a Minor Action.
- name: Waterlock
  mana_cost: 3
  casting_time: Reaction (when a creature you can see begins casting a spell)
  range: 60 ft
  duration: Instant
  effect: |-
    You force water into a creature's throat as they speak their incantation. Make a spell overcome roll vs. the target's END Ward.

      - **Overcome:** Their spell fails immediately \- any Mana spent or scroll consumed is still lost. They are Silenced until the end of their next turn.
      - **Resist:** Their spell still takes effect, but they take 1d8 cold damage as water floods their lungs.
- name: Glacial Hold
  mana_cost: 4
  casting_time: Major Action
  range: 60 ft
  duration: Instant
  effect: |-
    You solidify the humidity above your opponents, dropping a wave of killing cold water onto them from a point you can see. Make a spell overcome roll vs. each creature's DEX Ward within a 15 ft radius.

      - **Overcome:** 3d8+ARC cold damage. Their feet freeze to the ground as they fall \- they are knocked Prone.
      - **Resist:** Half damage. They remain standing but the ground beneath them is now treacherous.


    - The ground in the area freezes solid (as Rime Slick) for 1 minute.
- name: Heartfreeze
  mana_cost: 5
  casting_time: Major Action
  range: 30 ft
  duration: Instant
  effect: |-
    You reach toward a creature and freeze the water in their blood. Make a spell overcome roll vs. the target's END Ward.

      - **Overcome:** 4d8+ARC cold damage and their speed becomes 0 until the end of their next turn. While their speed is 0 from this effect, they have disadvantage on all attack rolls and their Evasion is reduced by 3 as their limbs refuse to cooperate.
      - **Resist:** Half damage. Their speed is halved until the end of their next turn.


    - At the end of each of their turns, the target may attempt to shake off the effect by rolling 1d12 \+ END \+ best END skill vs. the original spell roll. On success, an Overcome downgrades to the Resist effect. On success against the Resist effect, the speed reduction ends.

    - Creatures without blood or with cold immunity are unaffected.
