- name: Snuff
  mana_cost: 1
  casting_time: Major Action
  range: 30 ft
  duration: Instant
  effect: |-
    You cause a creature's own shadow to coil and bite. Make a spell overcome roll vs. the target's CHA Ward.

      - **Overcome:** Target takes 1d6 \+ ARC cold damage. The target's shadow writhes visibly \- they have disadvantage on their next Perception check as their own darkness distracts them.
      - **Resist:** Target takes 1d4 \+ ARC cold damage.
- name: Veil of Shadows
  mana_cost: 2
  casting_time: Major Action
  range: Touch
  duration: 1 hour / (Channel; if given to more than just one creature)
  effect: |-
    A creature you touch becomes invisible until the spell ends. Anything the target is wearing or carrying is invisible as long as it is on the target's person. This shroud is built for patient movement, not combat.

    - It ends the instant before the target makes an attack roll or casts a spell - that triggering action itself gains no benefit from the invisibility.
    - It also ends immediately if the target moves more than half their speed on a single turn (a Dash always ends it).
- name: Blinding Shadow
  mana_cost: 2
  casting_time: Major Action
  range: 30 ft
  duration: 1 minute
  effect: |-
    You cause a creature's own shadow to rise up and wrap around their eyes. Make a spell overcome roll vs. the target's CHA Ward.

      - **Overcome:** The creature is Blinded for the duration. At the end of each of their turns, the target may attempt to tear free by rolling 1d12 \+ CHA \+ best CHA skill vs. the original spell roll. On success, the effect ends.
      - **Resist:** Their vision dims momentarily \- they have disadvantage on their next attack roll.


    - This spell has no effect on creatures without shadows or in areas of complete darkness (where no shadow exists to manipulate).
- name: Manifest Shadow
  mana_cost: 3
  casting_time: Major Action
  range: 30 ft
  duration: Instant
  effect: |-
    You can manifest a shadow of yourself in an unoccupied space you can see. This shadow is a translucent, gray image of you that lasts until it is destroyed, until you dismiss it as a Minor Action, until you manifest another shadow, or until you're unconscious.

    - Your shadow has Evasion 14 \+ ARC, 1 HP, and immunity to all conditions. Its Ward values equal yours. It is the same size as you, and it occupies its own space. On your turn, you can mentally command the shadow to move up to 30 feet in any direction (no action required). If your shadow is ever more than 30 feet from you at the end of your turn, it is destroyed.

    - As a Minor Action, you can magically swap places with your shadow at a cost of 3 Mana and 15 feet of your movement, regardless of the distance between the two of you.

    - When you take the Attack action on your turn, any attack you make with that action can originate from your space or the shadow's space at the cost of 2 Mana. You make this choice for each attack.

    - When a creature that you can see within 5 feet of your shadow moves at least 5 feet away from it, you can spend 2 Mana to use your reaction to make an opportunity attack against that creature as if you were in the shadow's space.
- name: Tenebrous Relocation
  mana_cost: 3
  casting_time: Major Action
  range: 60 ft
  duration: Instant
  effect: You dissolve into shadow and reform at an unoccupied space you can see within range. Both your starting position and destination must be in dim light or darkness. This movement does not provoke opportunity attacks. If you were hidden before casting, you may immediately make a Stealth check (no action required) to remain hidden at your destination.
- name: Hungering Dark
  mana_cost: 4
  casting_time: Major Action
  range: 90 ft
  duration: Channel
  effect: You conjure a 20-foot radius sphere of devouring darkness centered on a point within range. Any creature other than you that starts its turn in the darkness or enters it for the first time on its turn takes 1d8 cold damage as the shadow drains their warmth. The darkness is absolute \- only magical darkvision can penetrate it. The area is heavily obscured.
- name: Umbral Ambush
  mana_cost: 4
  casting_time: Major Action
  range: Self
  duration: Until the end of your next turn
  effect: |-
    You cloak yourself in shadow thick enough to swallow a killing blow. You must be in dim light or darkness to cast this spell. You become invisible for the duration.

    - Unlike lesser shadow-work, this shroud does not collapse the instant you attack or cast a spell - your invisibility persists through that action, ending only once you deal damage with it (or at the end of your next turn, whichever comes first).
    - The shroud still ends immediately if you move more than half your speed on a single turn (a Dash always ends it) - it demands patience, not haste.
- name: Void Shroud
  mana_cost: 5
  casting_time: Major Action
  range: 60 ft
  duration: Channel
  effect: |-
    You attempt to tear a creature from existence, casting them into the void between shadows. Make a spell overcome roll vs. the target's MIND Ward.

      - **Overcome:** The target vanishes, banished to a lightless plane of absolute emptiness. While banished, they are incapacitated and cannot take actions, move, or perceive anything. When the spell ends (either because you stop channeling, lose concentration, or the duration expires), the target reappears in the nearest unoccupied space to where they vanished and takes 4d8 cold damage as the void releases them.
      - **Resist:** The target resists banishment but the void still claws at them \- they take 2d8 cold damage immediately and their speed is halved until the end of their next turn as shadows cling to their limbs.
