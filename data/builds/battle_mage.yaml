key: battle_mage
name: Battle Mage
description: >
  A MIND/ARC Pyromancer who stays unarmored to keep Armor Penalty at 0 for
  spellcasting, carrying a dagger as a backup melee option. Stands in for
  both Arcane and Divine casters, since combat math (Spell Modifier, attack
  and overcome rolls) is identical between the two traditions.
weapon_skill: Daggers & Knives
school_skill: Pyromancy
