name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone wiki repo
        env:
          # Default auth uses GITHUB_TOKEN, which requires repo Settings > Actions >
          # General > Workflow permissions = "Read and write permissions" (wiki repos
          # share the parent repo's permission model). If that's unavailable/locked,
          # swap GITHUB_TOKEN below for a repo secret holding a classic PAT with
          # `repo` scope (e.g. WIKI_SYNC_TOKEN).
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki

      - name: Mirror core/ into wiki checkout
        run: |
          # Remove everything except .git, Home.md, and _Sidebar.md (hand-authored,
          # never generated) so renamed/deleted core/ files don't leave orphan pages.
          find wiki -mindepth 1 \
            ! -path 'wiki/.git*' \
            ! -name 'Home.md' \
            ! -name '_Sidebar.md' \
            -delete

          # Copy core/'s contents into the wiki root, stripping the core/ prefix,
          # so core/combat/combat.md becomes wiki/combat/combat.md, etc.
          cp -r core/. wiki/

      - name: Commit and push if changed
        working-directory: wiki
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Sync wiki from core/ (${{ github.sha }})"
          git push
